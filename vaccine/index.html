<div class="container">
    <h1>👶 শিশুর টিকা সূচি</h1>

        <form id="vaccineForm">
            <label>জন্ম তারিখ দিন:</label><br><br>
            <input type="date" id="dob" required>

            <button type="submit">তালিকা দেখুন</button>
        </form>

        <div class="btn-group">
            <button onclick="downloadPDF()">PDF Download</button>
            <button onclick="window.print()">Print</button>
        </div>
    </div>

    <div class="table-wrapper">
        <table id="result">
            <thead>
                   <tr>
                    <th>টিকার নাম</th>
                    <th>সময়</th>
                    <th>তারিখ</th>
                 <th>ডোজ</th>
    </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>
